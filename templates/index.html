<!DOCTYPE html>
<html>
<head>
    <title>YOLO Object Detection</title>
</head>
<body>

<h2>Upload Image for Detection</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image">
    <button type="submit">Detect</button>
</form>

{% if result_img %}
    <h3>Result:</h3>
    <img src="{{ result_img }}" width="400">
{% endif %}

</body>
</html>
